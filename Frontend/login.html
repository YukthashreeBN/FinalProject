<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – LiveLearn Plus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 mb-2">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center"><span class="text-white font-bold">L+</span></div>
        <span style="font-family:'Sora',sans-serif" class="font-bold text-xl text-blue-700">LiveLearnPlus</span>
      </a>
      <h1 style="font-family:'Sora',sans-serif" class="text-2xl font-bold text-gray-900 mt-4">Welcome back</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to continue learning</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
      <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm font-medium"></div>

      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5" for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"/>
          <p id="emailError" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email.</p>
        </div>
        <!-- Password -->
        <div class="mb-5">
          <div class="flex justify-between items-center mb-1.5">
            <label class="block text-sm font-semibold text-gray-700" for="password">Password</label>
            <a href="#" class="text-xs text-blue-600 hover:underline">Forgot password?</a>
          </div>
          <div class="relative">
            <input type="password" id="password" name="password" placeholder="••••••••"
              class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-10"/>
            <button type="button" id="togglePassword" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            </button>
          </div>
          <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">Password must be at least 6 characters.</p>
        </div>
        <!-- Submit -->
        <button type="submit" id="loginBtn"
          class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition text-sm mt-2 flex items-center justify-center gap-2">
          <span id="loginBtnText">Sign In</span>
          <svg id="loginSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">Don't have an account? <a href="register.html" class="text-blue-600 font-semibold hover:underline">Sign up</a></p>
    </div>

    <!-- Demo accounts -->
    <div class="mt-6 bg-blue-50 border border-blue-100 rounded-xl p-4">
      <p class="text-xs font-semibold text-blue-700 mb-2">🔑 Demo Accounts</p>
      <div class="space-y-1 text-xs text-blue-600">
        <div class="flex justify-between"><span>Student:</span><span>student@demo.com / demo123</span></div>
        <div class="flex justify-between"><span>Teacher:</span><span>teacher@demo.com / demo123</span></div>
        <div class="flex justify-between"><span>Admin:</span><span>admin@demo.com / demo123</span></div>
      </div>
    </div>
  </div>

  <script src="js/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>

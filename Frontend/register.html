<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – LiveLearn Plus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body class="bg-gradient-to-br from-blue-50 via-white to-indigo-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2 mb-2">
        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center"><span class="text-white font-bold">L+</span></div>
        <span style="font-family:'Sora',sans-serif" class="font-bold text-xl text-blue-700">LiveLearnPlus</span>
      </a>
      <h1 style="font-family:'Sora',sans-serif" class="text-2xl font-bold text-gray-900 mt-4">Create an account</h1>
      <p class="text-gray-500 text-sm mt-1">Join thousands of learners today</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8">
      <div id="alertBox" class="hidden mb-4 p-3 rounded-lg text-sm font-medium"></div>

      <form id="registerForm" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Full Name</label>
          <input type="text" id="name" placeholder="John Doe"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>
          <p id="nameError" class="text-red-500 text-xs mt-1 hidden">Name is required.</p>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>
          <p id="emailError" class="text-red-500 text-xs mt-1 hidden">Please enter a valid email.</p>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Role</label>
          <select id="role"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition bg-white">
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
          <p id="roleError" class="text-red-500 text-xs mt-1 hidden">Please select a role.</p>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>
          <p id="passwordError" class="text-red-500 text-xs mt-1 hidden">Password must be at least 6 characters.</p>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition"/>
          <p id="confirmError" class="text-red-500 text-xs mt-1 hidden">Passwords do not match.</p>
        </div>
        <button type="submit" id="registerBtn"
          class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition text-sm flex items-center justify-center gap-2">
          <span id="registerBtnText">Create Account</span>
          <svg id="registerSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        </button>
      </form>
      <p class="text-center text-sm text-gray-500 mt-6">Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Sign in</a></p>
    </div>
  </div>

  <script src="js/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
